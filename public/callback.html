<!DOCTYPE html>
<html>
<head>
  <title>OAuth Callback</title>
</head>
<body>

<div class="container">

  <h1>OAuth Callback</h1>

  <h3>Authorization Code</h3>
  <pre id="authCodeBox"></pre>

  <h3>Token</h3>
  <pre id="tokenBox"></pre>

</div>

<script>
  // get query params from url
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get("code");

  // show auth code if we have it
  document.getElementById("authCodeBox").textContent = code || "no code found";

  // only call backend if code exists
  if (code) {
    fetch(`/exchange?code=${encodeURIComponent(code)}`)
      .then(res => res.json())
      .then(data => {

        // just dump response for now
        document.getElementById("tokenBox").textContent =
          JSON.stringify(data, null, 2);

      })
      .catch(err => {
        console.log("error while fetching token", err);

        document.getElementById("tokenBox").textContent =
          "something went wrong";
      });
  }
</script>

</body>
</html>
